<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
            background: url('images/background2.jpg') center/cover no-repeat;
        }

        .container {
            display: flex;
            width: 80%;
            max-width: 900px;
            background-color: #020302;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.5);
        }

        .image-section {
            width: 50%;
            background: url('images/pic6.jpg') center/cover no-repeat;
        }

        .form-section {
            width: 50%;
            padding: 40px;
            color: #fff;
        }

        .form-section h2 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .form-section p {
            font-size: 1rem;
            margin-bottom: 20px;
            color: #ccc;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            font-size: 1rem;
            border-radius: 5px;
            border: none;
            background-color: #222;
            color: #fff;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .remember-forgot a {
            color: #3498db;
            text-decoration: none;
        }

        .login-button {
            width: 100%;
            padding: 10px;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            background-color: #3498db;
            color: white;
            cursor: pointer;
        }

        .login-button:hover {
            background-color: #2980b9;
        }

        .register-link {
            margin-top: 15px;
            text-align: center;
            font-size: 0.9rem;
        }

        .register-link a {
            color: #3498db;
            text-decoration: none;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                width: 90%;
            }

            .image-section {
                width: 100%;
                height: 200px;
            }

            .form-section {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="image-section"></div>
        <div class="form-section">
            <h2>Login</h2>
            <p>Welcome back! Please login to your account.</p>
            
            <form>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password">
                </div>

                <div class="remember-forgot">
                    <label><input type="checkbox"> Remember Me</label>
                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit" class="login-button">Login</button>

                <div class="register-link">
                    Don't have an account? <a href="signuppage.html">Sign up</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
